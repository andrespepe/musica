<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>música</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface2: #1e1e1e;
    --border: #2a2a2a; --accent: #c8a97e; --text: #e8e0d5; --muted: #6b6458; --active: #c8a97e22;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  #topbar { display:flex;align-items:center;justify-content:space-between;padding:18px 28px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:16px; }
  #title-area h1 { font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--accent);letter-spacing:.01em;line-height:1; }
  #title-area span { font-size:11px;color:var(--muted);letter-spacing:.08em; }
  #search-wrap { flex:1;max-width:320px;position:relative; }
  #search { width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:8px 12px 8px 32px;border-radius:4px;outline:none;transition:border-color .2s; }
  #search:focus { border-color:var(--accent); }
  #search::placeholder { color:var(--muted); }
  #search-wrap svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none; }

  #main { display:flex;flex:1;overflow:hidden; }
  #sidebar { width:340px;min-width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0; }
  #list-header { padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
  #song-list { flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent; }
  #song-list::-webkit-scrollbar { width:4px; }
  #song-list::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }

  .song-item { display:flex;align-items:center;padding:9px 16px;gap:10px;cursor:pointer;border-left:2px solid transparent;transition:background .15s; }
  .song-item:hover { background:var(--surface2); }
  .song-item.active { background:var(--active);border-left-color:var(--accent); }
  .song-item.active .song-name { color:var(--accent); }
  .song-num { font-size:11px;color:var(--muted);width:28px;text-align:right;flex-shrink:0; }
  .song-item.active .song-num { color:var(--accent); }
  .song-name { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;line-height:1.3; }
  .now-playing-dot { width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 1.4s ease-in-out infinite;display:none; }
  .song-item.active.playing .now-playing-dot { display:block; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)} }

  #player-area { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;position:relative;overflow:hidden; }
  #player-area::before { content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,#c8a97e08 0%,transparent 70%);pointer-events:none; }

  #now-info { text-align:center;margin-bottom:40px;max-width:480px; }
  #now-title { font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:var(--text);line-height:1.25;margin-bottom:8px;font-style:italic; }
  #now-sub { font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase; }

  #disc { width:160px;height:160px;border-radius:50%;background:conic-gradient(#1a1a1a 0deg,#222 30deg,#1a1a1a 60deg,#222 90deg,#1a1a1a 120deg,#222 150deg,#1a1a1a 180deg,#222 210deg,#1a1a1a 240deg,#222 270deg,#1a1a1a 300deg,#222 330deg,#1a1a1a 360deg);box-shadow:0 0 0 2px #2a2a2a,0 8px 40px #00000060;position:relative;margin-bottom:36px; }
  #disc::before { content:'';position:absolute;inset:0;border-radius:50%;background:repeating-radial-gradient(circle at center,transparent 18px,#00000022 18px,#00000022 19px); }
  #disc::after { content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:var(--accent);top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 3px #0e0e0e; }
  #disc.spinning { animation:spin 4s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  #progress-wrap { width:100%;max-width:420px;margin-bottom:10px; }
  #progress-bar { width:100%;height:3px;background:var(--border);border-radius:2px;cursor:pointer;position:relative; }
  #progress-fill { height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .1s linear;position:relative; }
  #progress-fill::after { content:'';position:absolute;right:-4px;top:-3px;width:9px;height:9px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .2s; }
  #progress-bar:hover #progress-fill::after { opacity:1; }
  #time-row { display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-top:6px; }

  #controls { display:flex;align-items:center;gap:6px;margin-top:20px; }
  .ctrl-btn { background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s; }
  .ctrl-btn:hover { color:var(--text);background:var(--surface2); }
  .ctrl-btn.active { color:var(--accent); }
  #play-btn { width:48px;height:48px;border-radius:50%;background:var(--accent);color:#0e0e0e;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s;margin:0 8px; }
  #play-btn:hover { opacity:.85;transform:scale(1.05); }

  #vol-wrap { display:flex;align-items:center;gap:8px;margin-top:18px;color:var(--muted); }
  #vol-slider { -webkit-appearance:none;width:90px;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer; }
  #vol-slider::-webkit-slider-thumb { -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer; }

  #status-area { text-align:center;color:var(--muted); }
  #status-area p:first-child { font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);font-style:italic;margin-bottom:10px; }
  #status-area p { font-size:12px;line-height:1.8; }
  .spinner { width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px; }

  @media(max-width:640px){
    #sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);height:45%;}
    #main{flex-direction:column;}
    #player-area{padding:20px 16px;}
    #disc{width:100px;height:100px;margin-bottom:20px;}
    #now-title{font-size:20px;}
  }
  audio { display:none; }
</style>
</head>
<body>

<div id="topbar">
  <div id="title-area">
    <h1>música</h1>
    <span id="lib-count">cargando…</span>
  </div>
  <div id="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="buscar…" autocomplete="off">
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="list-header">
      <span style="font-size:11px;color:var(--muted);letter-spacing:.06em">LISTA</span>
      <span id="list-count" style="font-size:11px;color:var(--muted)">—</span>
    </div>
    <div id="song-list"></div>
  </div>

  <div id="player-area">
    <div id="status-area">
      <div class="spinner"></div>
      <p>cargando biblioteca</p>
      <p>un momento…</p>
    </div>
    <div id="player-ui" style="display:none;flex-direction:column;align-items:center;width:100%;">
      <div id="disc"></div>
      <div id="now-info">
        <div id="now-title">—</div>
        <div id="now-sub">ahora suena</div>
      </div>
      <div id="progress-wrap">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="time-row"><span id="time-cur">0:00</span><span id="time-tot">0:00</span></div>
      </div>
      <div id="controls">
        <button class="ctrl-btn" id="btn-shuffle" title="aleatorio">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-prev" title="anterior">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>
        <button id="play-btn">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-next" title="siguiente">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-loop" title="bucle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>
      <div id="vol-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="1">
      </div>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
  let songs = [], filtered = [], current = -1;
  let shuffle = false, loop = false, playing = false;
  let shuffleOrder = [], shuffleIdx = 0;

  const audio        = document.getElementById('audio');
  const songList     = document.getElementById('song-list');
  const statusArea   = document.getElementById('status-area');
  const playerUI     = document.getElementById('player-ui');
  const nowTitle     = document.getElementById('now-title');
  const progressFill = document.getElementById('progress-fill');
  const progressBar  = document.getElementById('progress-bar');
  const timeCur      = document.getElementById('time-cur');
  const timeTot      = document.getElementById('time-tot');
  const playIcon     = document.getElementById('play-icon');
  const pauseIcon    = document.getElementById('pause-icon');
  const disc         = document.getElementById('disc');
  const libCount     = document.getElementById('lib-count');
  const listCount    = document.getElementById('list-count');
  const searchInput  = document.getElementById('search');
  const volSlider    = document.getElementById('vol-slider');

  function driveURL(id) {
    return `https://drive.google.com/uc?export=download&id=${id}`;
  }

  async function loadSongs() {
    try {
      const res = await fetch('songs.json');
      if (!res.ok) throw new Error('songs.json no encontrado');
      songs = await res.json();
      filtered = [...songs];
      shuffleOrder = buildShuffleOrder(songs.length);
      renderList();
      updateCounts();
      statusArea.style.display = 'none';
      playerUI.style.display = 'flex';
      if (songs.length) playSong(0);
    } catch (err) {
      statusArea.innerHTML = `<p style="color:var(--accent)">error al cargar</p><p style="font-size:11px;margin-top:8px">${err.message}</p>`;
    }
  }

  function renderList() {
    songList.innerHTML = '';
    filtered.forEach((s, i) => {
      const gi = songs.indexOf(s);
      const item = document.createElement('div');
      item.className = 'song-item' + (gi===current?' active':'') + (gi===current&&playing?' playing':'');
      item.dataset.idx = i;
      item.innerHTML = `<span class="song-num">${i+1}</span><span class="song-name" title="${s.name}">${s.name}</span><span class="now-playing-dot"></span>`;
      item.onclick = () => playSong(songs.indexOf(filtered[i]));
      songList.appendChild(item);
    });
  }

  function updateCounts() {
    const n = songs.length;
    libCount.textContent = `${n} canción${n!==1?'es':''}`;
    listCount.textContent = `${filtered.length} canción${filtered.length!==1?'es':''}`;
  }

  function playSong(idx) {
    current = idx;
    const s = songs[idx];
    audio.src = driveURL(s.id);
    audio.play();
    playing = true;
    nowTitle.textContent = s.name;
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
    disc.classList.add('spinning');
    updateActiveItem();
    scrollToActive();
  }

  function togglePlay() {
    if (current < 0) { if (songs.length) playSong(0); return; }
    if (audio.paused) {
      audio.play(); playing = true;
      playIcon.style.display = 'none'; pauseIcon.style.display = 'block';
      disc.classList.add('spinning');
    } else {
      audio.pause(); playing = false;
      playIcon.style.display = 'block'; pauseIcon.style.display = 'none';
      disc.classList.remove('spinning');
    }
    updateActiveItem();
  }

  document.getElementById('play-btn').onclick = togglePlay;

  function nextSong() {
    if (!songs.length) return;
    if (shuffle) { shuffleIdx=(shuffleIdx+1)%songs.length; playSong(shuffleOrder[shuffleIdx]); }
    else playSong((current+1)%songs.length);
  }
  function prevSong() {
    if (!songs.length) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    if (shuffle) { shuffleIdx=(shuffleIdx-1+songs.length)%songs.length; playSong(shuffleOrder[shuffleIdx]); }
    else playSong((current-1+songs.length)%songs.length);
  }

  document.getElementById('btn-next').onclick = nextSong;
  document.getElementById('btn-prev').onclick = prevSong;
  audio.onended = () => { if (loop) { audio.play(); return; } nextSong(); };

  function buildShuffleOrder(n) {
    const a=Array.from({length:n},(_,i)=>i);
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  document.getElementById('btn-shuffle').onclick = function(){
    shuffle=!shuffle; this.classList.toggle('active',shuffle);
    if(shuffle){shuffleOrder=buildShuffleOrder(songs.length);shuffleIdx=shuffleOrder.indexOf(current);}
  };
  document.getElementById('btn-loop').onclick = function(){ loop=!loop; this.classList.toggle('active',loop); };

  audio.ontimeupdate = () => {
    if (!audio.duration) return;
    progressFill.style.width=(audio.currentTime/audio.duration*100)+'%';
    timeCur.textContent=fmt(audio.currentTime);
    timeTot.textContent=fmt(audio.duration);
  };
  progressBar.onclick = e => {
    const r=progressBar.getBoundingClientRect();
    audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;
  };
  function fmt(s){const m=Math.floor(s/60);return `${m}:${Math.floor(s%60).toString().padStart(2,'0')}`;}

  volSlider.oninput = () => { audio.volume=volSlider.value; };

  document.addEventListener('keydown', e => {
    if (e.target===searchInput) return;
    if (e.code==='Space'){e.preventDefault();togglePlay();}
    if (e.code==='ArrowRight') audio.currentTime=Math.min(audio.currentTime+5,audio.duration);
    if (e.code==='ArrowLeft')  audio.currentTime=Math.max(audio.currentTime-5,0);
    if (e.code==='ArrowUp'){e.preventDefault();volSlider.value=Math.min(+volSlider.value+.05,1);audio.volume=volSlider.value;}
    if (e.code==='ArrowDown'){e.preventDefault();volSlider.value=Math.max(+volSlider.value-.05,0);audio.volume=volSlider.value;}
    if (e.code==='KeyN') nextSong();
    if (e.code==='KeyP') prevSong();
  });

  searchInput.oninput = () => {
    const q=searchInput.value.toLowerCase().trim();
    filtered=q?songs.filter(s=>s.name.toLowerCase().includes(q)):[...songs];
    renderList();
    listCount.textContent=`${filtered.length} canción${filtered.length!==1?'es':''}`;
  };

  function updateActiveItem(){
    document.querySelectorAll('.song-item').forEach(el=>{
      const gi=songs.indexOf(filtered[+el.dataset.idx]);
      el.classList.toggle('active',gi===current);
      el.classList.toggle('playing',gi===current&&playing);
    });
  }
  function scrollToActive(){
    const a=songList.querySelector('.song-item.active');
    if(a) a.scrollIntoView({block:'nearest',behavior:'smooth'});
  }

  loadSongs();
</script>
</body>
</html>
